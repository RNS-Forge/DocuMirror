<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Processes - DocuMirror AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/agent.css">
    <link rel="stylesheet" href="css/processes.css">
</head>
<body>
    <div class="app-container">
        
        <aside class="panel left-panel process-sidebar">
            <div class="panel-header">
                <h2>System Overview</h2>
                <p>Live Resource Utilization</p>
            </div>
            
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-title">CPU Usage</div>
                    <div class="stat-value" id="cpu-val">--%</div>
                    <div class="progress-bar"><div class="progress-fill" id="cpu-bar" style="width: 0%"></div></div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-title">Memory Usage</div>
                    <div class="stat-value" id="mem-val">--%</div>
                    <div class="progress-bar"><div class="progress-fill" id="mem-bar" style="width: 0%"></div></div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-title">App Memory</div>
                    <div class="stat-value" id="app-mem-val">-- MB</div>
                </div>
            </div>

            <a href="agent.html" class="btn btn-secondary back-btn">← Back to Agent</a>
        </aside>

        <main class="panel center-panel process-main">
            <div class="panel-header">
                <div class="header-flex">
                    <div>
                        <h2>Live Processing Jobs</h2>
                        <p>Track current agent pipeline executions</p>
                    </div>
                    <button class="btn btn-primary btn-sm" id="refresh-btn">Refresh</button>
                </div>
            </div>

            <div class="jobs-list" id="jobs-list">
                <div class="empty-state">Loading processes...</div>
            </div>
        </main>

    </div>
    
    <script src="js/processes.js"></script>
</body>
</html>
