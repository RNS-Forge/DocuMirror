<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocuMirror — Loading Animation</title>
<link rel="icon" type="image/svg+xml" href="logo-mark.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #12151c;
    --accent: #1f4fd8;
    --accent-dark: #163aa3;
    --muted: #6b7280;
    --line: #dfe3e8;
    --paper: #f6f7f9;
    --surface: #ffffff;
    --radius: 5px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 64px;
    padding: 60px 20px;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
  }

  h1 { font-family: var(--font-display); font-size: 15px; text-align:center; color: var(--muted); font-weight: 600; letter-spacing: 0.02em; margin-bottom: 24px; }
  .demo-block { display: flex; flex-direction: column; align-items: center; gap: 20px; }

  /* ============================================================
     CORE LOADER — the DocuMirror mark used as a loading indicator.
     Motion: the center seam sweeps top-to-bottom like a document
     scan pass, while the mark breathes subtly to read as "alive".
     ============================================================ */
  .dm-loader {
    --size: 56px;
    width: var(--size);
    height: var(--size);
    position: relative;
    animation: dm-breathe 2.2s ease-in-out infinite;
  }
  @keyframes dm-breathe {
    0%, 100% { transform: scale(1);    opacity: 1;   }
    50%      { transform: scale(0.94); opacity: 0.88;}
  }

  .dm-loader svg { width: 100%; height: 100%; display: block; overflow: visible; }

  /* scan sweep clipped to the mark's own shape */
  .dm-scan-rect {
    animation: dm-scan 1.6s cubic-bezier(.45,0,.55,1) infinite;
  }
  @keyframes dm-scan {
    0%   { transform: translateY(-34px); opacity: 0; }
    12%  { opacity: 1; }
    88%  { opacity: 1; }
    100% { transform: translateY(34px); opacity: 0; }
  }

  /* fold flap glints once per cycle */
  .dm-flap {
    transform-origin: 26px 3px;
    animation: dm-flap 3.2s ease-in-out infinite;
  }
  @keyframes dm-flap {
    0%, 80%, 100% { transform: rotate(0deg); }
    88%           { transform: rotate(-14deg); }
    94%           { transform: rotate(0deg); }
  }

  .dm-caption {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .dm-caption .dots span { animation: dm-dots 1.4s infinite; opacity: 0; }
  .dm-caption .dots span:nth-child(1) { animation-delay: 0s; }
  .dm-caption .dots span:nth-child(2) { animation-delay: .2s; }
  .dm-caption .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dm-dots { 0%,60%,100% { opacity:0; } 30% { opacity:1; } }

  /* ---- Size variants ---- */
  .dm-loader.sm { --size: 22px; }
  .dm-loader.lg { --size: 96px; }

  /* ---- Inline button usage ---- */
  .demo-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--ink); color: #fff; border: none;
    border-radius: var(--radius); padding: 12px 22px;
    font-size: 13.5px; font-weight: 600; font-family: inherit;
  }

  /* ---- Full-screen overlay variant ---- */
  .overlay-demo {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 56px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    box-shadow: 0 10px 28px -10px rgba(18,21,28,0.16);
  }
  .overlay-title { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--ink); }
  .overlay-sub { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-align:center; max-width: 320px; }
  .overlay-bar {
    width: 220px; height: 3px; background: var(--paper); border-radius: var(--radius);
    overflow: hidden; margin-top: 4px;
  }
  .overlay-bar-fill {
    height: 100%; width: 30%; background: var(--accent);
    animation: dm-indeterminate 1.4s infinite linear; transform-origin: 0 50%;
  }
  @keyframes dm-indeterminate {
    0%   { transform: translateX(-100%) scaleX(1); }
    50%  { transform: translateX(150%) scaleX(1.6); }
    100% { transform: translateX(400%) scaleX(1); }
  }
</style>
</head>
<body>

<div class="demo-block">
  <h1>Small — inline / button</h1>
  <button class="demo-btn">
    <span class="dm-loader sm">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="clip-sm"><path d="M6,0 H26 L32,6 V26 A6,6 0 0 1 26,32 H6 A6,6 0 0 1 0,26 V6 A6,6 0 0 1 6,0 Z"/></clipPath>
          <linearGradient id="scanGrad-sm" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f6f7f9" stop-opacity="0"/>
            <stop offset="50%" stop-color="#f6f7f9" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#f6f7f9" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="M6,0 H16 V32 H6 A6,6 0 0 1 0,26 V6 A6,6 0 0 1 6,0 Z" fill="#12151c"/>
        <path d="M16,0 H26 L32,6 V26 A6,6 0 0 1 26,32 H16 Z" fill="#1f4fd8"/>
        <g class="dm-flap"><path d="M26,0 L32,6 H26 Z" fill="#163aa3"/></g>
        <rect x="15.25" y="4" width="1.5" height="24" rx="0.75" fill="#f6f7f9" opacity="0.9"/>
        <g clip-path="url(#clip-sm)">
          <rect class="dm-scan-rect" x="0" y="0" width="32" height="10" fill="url(#scanGrad-sm)"/>
        </g>
      </svg>
    </span>
    Processing document
  </button>

  <p class="dm-caption">Running extraction pipeline<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
</div>

<div class="demo-block">
  <h1>Medium — pipeline / panel indicator</h1>
  <span class="dm-loader">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="clip-md"><path d="M6,0 H26 L32,6 V26 A6,6 0 0 1 26,32 H6 A6,6 0 0 1 0,26 V6 A6,6 0 0 1 6,0 Z"/></clipPath>
        <linearGradient id="scanGrad-md" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
          <stop offset="50%" stop-color="#ffffff" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="M6,0 H16 V32 H6 A6,6 0 0 1 0,26 V6 A6,6 0 0 1 6,0 Z" fill="#12151c"/>
      <path d="M16,0 H26 L32,6 V26 A6,6 0 0 1 26,32 H16 Z" fill="#1f4fd8"/>
      <g class="dm-flap"><path d="M26,0 L32,6 H26 Z" fill="#163aa3"/></g>
      <rect x="15.25" y="4" width="1.5" height="24" rx="0.75" fill="#f6f7f9" opacity="0.9"/>
      <g clip-path="url(#clip-md)">
        <rect class="dm-scan-rect" x="0" y="0" width="32" height="10" fill="url(#scanGrad-md)"/>
      </g>
    </svg>
  </span>
</div>

<div class="demo-block">
  <h1>Full overlay — page-level loading state</h1>
  <div class="overlay-demo">
    <span class="dm-loader lg">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="clip-lg"><path d="M6,0 H26 L32,6 V26 A6,6 0 0 1 26,32 H6 A6,6 0 0 1 0,26 V6 A6,6 0 0 1 6,0 Z"/></clipPath>
          <linearGradient id="scanGrad-lg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
            <stop offset="50%" stop-color="#ffffff" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="M6,0 H16 V32 H6 A6,6 0 0 1 0,26 V6 A6,6 0 0 1 6,0 Z" fill="#12151c"/>
        <path d="M16,0 H26 L32,6 V26 A6,6 0 0 1 26,32 H16 Z" fill="#1f4fd8"/>
        <g class="dm-flap"><path d="M26,0 L32,6 H26 Z" fill="#163aa3"/></g>
        <rect x="15.25" y="4" width="1.5" height="24" rx="0.75" fill="#f6f7f9" opacity="0.9"/>
        <g clip-path="url(#clip-lg)">
          <rect class="dm-scan-rect" x="0" y="0" width="32" height="10" fill="url(#scanGrad-lg)"/>
        </g>
      </svg>
    </span>
    <div class="overlay-title">Verifying extracted layout</div>
    <div class="overlay-sub">Comparing rendered output against the source document. This continues until the similarity target is met.</div>
    <div class="overlay-bar"><div class="overlay-bar-fill"></div></div>
  </div>
</div>

</body>
</html>
