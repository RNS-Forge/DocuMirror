<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Editor — DocuMirror</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<style>
  :root{
    --void:#0b0e13; --void-2:#141920; --void-3:#1a2029;
    --void-line:rgba(255,255,255,.09); --void-text:#e7ebe8; --void-mist:#8b96a1;
    --paper:#eef1ee; --ink:#10131a; --mist:#5c6670; --line:rgba(16,19,26,.12);
    --signal:#1f4fd8; --signal-bright:#4f7dff; --signal-tint:#eaf0fe; --signal-ink:#163aa3;
    --success:#147a50; --success-tint:#e6f4ee; --error:#b3271e; --error-tint:#fbeae9;
    --radius:3px;
    --font-display:'JetBrains Mono',monospace; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  a:focus-visible,button:focus-visible{outline:2px solid var(--signal);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important}}

  /* Nav */
  header.nav-header{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;border-bottom:1px solid var(--line);flex-shrink:0;background:#fff}
  .logo{font-family:var(--font-display);font-size:15px;font-weight:800;letter-spacing:-.01em;color:var(--ink);display:flex;align-items:center;gap:10px}
  .logo-icon{width:20px;height:20px}
  .logo-icon svg{width:100%;height:100%}
  .nav-right{display:flex;align-items:center;gap:14px}
  .nav-btn{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--mist);border:1px solid var(--line);border-radius:var(--radius);padding:7px 12px;transition:color .15s,border-color .15s,background-color .15s}
  .nav-btn:hover{color:var(--ink);border-color:var(--ink)}
  .nav-btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .nav-btn.primary:hover{background:var(--signal-ink);border-color:var(--signal-ink)}

  /* Shell */
  .editor-shell{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0}

  /* Code pane */
  .code-pane{display:flex;flex-direction:column;background:var(--void);min-width:0;border-right:1px solid var(--void-line)}
  .pane-head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--void-line);font-family:var(--font-mono);font-size:11px;color:var(--void-mist);flex-shrink:0}
  .pane-head .filename{color:var(--void-text)}
  .pane-actions{display:flex;gap:10px;align-items:center}
  .btn-sm{font-family:var(--font-mono);font-size:10px;color:var(--void-mist);border:1px solid var(--void-line);border-radius:3px;padding:3px 8px;text-transform:uppercase;transition:all .15s}
  .btn-sm:hover{border-color:var(--signal-bright);color:var(--signal-bright)}
  .save-state{font-size:10px;letter-spacing:.06em;text-transform:uppercase;transition:color .2s}
  .save-state.dirty{color:var(--signal-bright)}
  .save-state.saved{color:var(--void-mist)}
  .code-wrap{flex:1;display:flex;overflow:hidden;position:relative}
  #editor-container{flex:1;width:100%;height:100%;background:var(--void)}

  /* AI prompt bar */
  #ai-bar{display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:var(--void-2);border:1px solid var(--signal-bright);border-radius:4px;padding:8px 12px;align-items:center;gap:10px;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.6);width:92%;max-width:520px}
  #ai-bar label{font-family:var(--font-mono);font-size:10px;color:var(--signal-bright);font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
  #ai-input{flex:1;background:transparent;border:none;color:var(--void-text);font-family:var(--font-body);font-size:12.5px;outline:none}
  #ai-input::placeholder{color:var(--void-mist)}
  .ai-submit{background:var(--signal-bright);color:#fff;font-family:var(--font-mono);font-size:10px;padding:5px 10px;border-radius:2px;font-weight:700;text-transform:uppercase;transition:background .12s;white-space:nowrap}
  .ai-submit:hover{background:var(--signal-ink)}
  .ai-submit:disabled{opacity:.5;cursor:not-allowed}
  .ai-cancel{color:var(--void-mist);font-family:var(--font-mono);font-size:10px;font-weight:700;text-transform:uppercase;padding:5px}

  /* Refine bar */
  #refine-bar{display:none;flex-direction:column;gap:8px;background:var(--void-2);border-top:1px solid var(--void-line);padding:12px 16px;flex-shrink:0}
  #refine-bar.visible{display:flex}
  .refine-row{display:flex;gap:8px;align-items:center}
  #refine-input{flex:1;background:var(--void-3);border:1px solid var(--void-line);color:var(--void-text);font-family:var(--font-body);font-size:12.5px;padding:8px 12px;border-radius:3px;outline:none;transition:border-color .15s}
  #refine-input:focus{border-color:var(--signal-bright)}
  #refine-input::placeholder{color:var(--void-mist)}
  .refine-send{background:var(--signal-bright);color:#fff;font-family:var(--font-mono);font-size:11px;padding:8px 14px;border-radius:3px;font-weight:700;transition:background .12s;white-space:nowrap}
  .refine-send:hover{background:var(--signal-ink)}
  .refine-send:disabled{opacity:.5;cursor:not-allowed}
  .refine-close{color:var(--void-mist);font-family:var(--font-mono);font-size:10px;padding:4px 6px;text-transform:uppercase}
  .refine-status{font-family:var(--font-mono);font-size:10.5px;color:var(--void-mist)}
  .refine-status.thinking{color:var(--signal-bright);animation:pulse .9s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* Preview pane */
  .preview-pane{display:flex;flex-direction:column;background:var(--paper);min-width:0}
  .pane-head.light{background:#fff;border-bottom:1px solid var(--line);color:var(--mist)}
  .pane-head.light .filename{color:var(--ink)}
  #preview-frame{flex:1;border:none;background:#fff;width:100%;height:100%}

  /* Footer */
  footer{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--void);color:var(--void-mist);font-family:var(--font-mono);font-size:10.5px;flex-shrink:0}
  footer a{color:var(--void-mist);transition:color .15s}
  footer a:hover{color:var(--signal-bright)}
  .footer-links{display:flex;gap:18px}

  /* Toast */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;font-family:var(--font-mono);font-size:11.5px;padding:10px 18px;border-radius:var(--radius);opacity:0;transition:opacity .2s,transform .2s;z-index:999;pointer-events:none;white-space:nowrap}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:768px){.editor-shell{grid-template-columns:1fr}.preview-pane{display:none}}
</style>
</head>
<body>

<header class="nav-header">
  <a href="/" class="logo">
    <span class="logo-icon" aria-hidden="true">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M6,0 H16 V32 H6 A6,6 0 0 1 0,26 V6 A6,6 0 0 1 6,0 Z" fill="#12151c"/>
        <path d="M16,0 H26 L32,6 V26 A6,6 0 0 1 26,32 H16 Z" fill="#1f4fd8"/>
        <path d="M26,0 L32,6 H26 Z" fill="#163aa3"/>
        <rect x="15.25" y="4" width="1.5" height="24" rx=".75" fill="#f6f7f9" opacity=".9"/>
      </svg>
    </span>
    DocuMirror
  </a>
  <div class="nav-right">
    <button class="nav-btn" id="btn-copy-all" title="Copy all HTML">Copy HTML</button>
    <button class="nav-btn" id="btn-download" title="Download HTML file">Download</button>
    <button class="nav-btn" id="btn-refine-toggle" title="Open AI refinement bar">AI Refine</button>
    <a href="/upload" class="nav-btn primary">← Upload new</a>
  </div>
</header>

<div class="editor-shell">
  <!-- Code pane -->
  <div class="code-pane">
    <div class="pane-head">
      <span class="filename">document.html</span>
      <div class="pane-actions">
        <button class="btn-sm" id="btn-format">Format</button>
        <span class="save-state saved" id="save-state">Saved</span>
      </div>
    </div>
    <div class="code-wrap">
      <div id="editor-container"></div>
      <!-- Inline AI edit bar (Ctrl+I) -->
      <div id="ai-bar">
        <label>AI Edit:</label>
        <input type="text" id="ai-input" placeholder="Describe the change you want…" autocomplete="off"/>
        <button class="ai-submit" id="ai-submit">Apply</button>
        <button class="ai-cancel" id="ai-cancel">✕</button>
      </div>
    </div>
    <!-- AI refine bar (bottom) -->
    <div id="refine-bar">
      <div class="refine-row">
        <input type="text" id="refine-input" placeholder="e.g. Change the currency to EUR, add a discount column, translate labels to German…" autocomplete="off"/>
        <button class="refine-send" id="refine-send">Refine with AI</button>
        <button class="refine-close" id="refine-close">✕</button>
      </div>
      <span class="refine-status" id="refine-status"></span>
    </div>
  </div>

  <!-- Preview pane -->
  <div class="preview-pane">
    <div class="pane-head light">
      <span class="filename">Live preview</span>
      <div class="pane-actions" style="display:flex;gap:10px;align-items:center">
        <span id="render-status" style="font-family:var(--font-mono);font-size:10px;color:var(--mist)">ready</span>
        <button class="nav-btn" id="btn-fullscreen" style="padding:4px 8px;font-size:10px">Fullscreen</button>
      </div>
    </div>
    <iframe id="preview-frame" title="Document preview" sandbox="allow-same-origin allow-scripts"></iframe>
  </div>
</div>

<footer>
  <span>© 2026 RNS Solutions — DocuMirror</span>
  <div class="footer-links">
    <a href="/upload">Digitizer</a>
    <a href="/editor">Code editor</a>
  </div>
</footer>

<div id="toast"></div>

<script>
/* ============ Load HTML from localStorage ============ */
const STORAGE_KEY = 'documirror_html';
const FALLBACK_HTML = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Invoice</title>
  <style>
    @page { size: A4 portrait; margin: 12mm; }
    body { font-family: Arial, sans-serif; font-size: 10px; color: #000; }
    table { width: 100%; border-collapse: collapse; }
    td, th { border: 1px solid #000; padding: 4px 6px; vertical-align: top; }
    th { background: #f3f4f6; font-weight: bold; text-align: center; }
    .title { text-align: center; font-size: 14px; font-weight: bold; padding: 8px; background: #f3f4f6; }
  </style>
</head>
<body>
  <table>
    <tr><td colspan="4" class="title">COMMERCIAL INVOICE</td></tr>
    <tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Amount</th></tr>
    <tr><td>Sample item</td><td>1</td><td>$100.00</td><td>$100.00</td></tr>
    <tr><td colspan="3" style="text-align:right;font-weight:bold">Total</td><td>$100.00</td></tr>
  </table>
</body>
</html>`;

let currentHtml = localStorage.getItem(STORAGE_KEY) || FALLBACK_HTML;
let isDirty = false;
let editor;

/* ============ DOM refs ============ */
const saveStateEl    = document.getElementById('save-state');
const renderStatus   = document.getElementById('render-status');
const previewFrame   = document.getElementById('preview-frame');
const aiBar          = document.getElementById('ai-bar');
const aiInput        = document.getElementById('ai-input');
const aiSubmit       = document.getElementById('ai-submit');
const aiCancel       = document.getElementById('ai-cancel');
const refineBar      = document.getElementById('refine-bar');
const refineInput    = document.getElementById('refine-input');
const refineSend     = document.getElementById('refine-send');
const refineClose    = document.getElementById('refine-close');
const refineStatus   = document.getElementById('refine-status');
const toastEl        = document.getElementById('toast');

/* ============ Monaco setup ============ */
window.MonacoEnvironment = {
  getWorkerUrl: function() {
    return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
      self.MonacoEnvironment={baseUrl:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/'};
      importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/base/worker/workerMain.js');
    `)}`;
  }
};

require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function () {
  editor = monaco.editor.create(document.getElementById('editor-container'), {
    value: currentHtml,
    language: 'html',
    theme: 'vs-dark',
    automaticLayout: true,
    minimap: { enabled: false },
    fontSize: 13,
    fontFamily: "'JetBrains Mono', monospace",
    padding: { top: 16 },
    scrollBeyondLastLine: false,
    wordWrap: 'on',
  });

  editor.onDidChangeModelContent(() => {
    currentHtml = editor.getValue();
    localStorage.setItem(STORAGE_KEY, currentHtml);
    markDirty();
    clearTimeout(window._renderTimer);
    window._renderTimer = setTimeout(renderPreview, 350);
  });

  /* Format */
  document.getElementById('btn-format').addEventListener('click', () => {
    editor.getAction('editor.action.formatDocument').run();
  });

  /* Ctrl+S → mark saved */
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
    localStorage.setItem(STORAGE_KEY, editor.getValue());
    markSaved();
    showToast('Saved to browser storage');
  });

  /* Ctrl+I → open inline AI bar */
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyI, () => {
    aiBar.style.display = 'flex';
    aiInput.value = '';
    aiInput.focus();
  });

  renderPreview();
});
</script>

<script>
/* ============ Preview renderer ============ */
function renderPreview() {
  try {
    previewFrame.srcdoc = editor ? editor.getValue() : currentHtml;
    renderStatus.textContent = 'rendered';
    renderStatus.style.color = 'var(--mist)';
  } catch (e) {
    renderStatus.textContent = 'render error';
    renderStatus.style.color = '#dc2626';
  }
}

/* ============ Dirty / saved state ============ */
function markDirty() {
  if (!isDirty) {
    isDirty = true;
    saveStateEl.textContent = 'Unsaved';
    saveStateEl.className = 'save-state dirty';
  }
}
function markSaved() {
  isDirty = false;
  saveStateEl.textContent = 'Saved';
  saveStateEl.className = 'save-state saved';
}

/* ============ Toolbar buttons ============ */
document.getElementById('btn-copy-all').addEventListener('click', () => {
  const html = editor ? editor.getValue() : currentHtml;
  navigator.clipboard.writeText(html).then(() => showToast('HTML copied to clipboard'));
});

document.getElementById('btn-download').addEventListener('click', () => {
  const html = editor ? editor.getValue() : currentHtml;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
  a.download = 'document.html';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('btn-fullscreen').addEventListener('click', () => {
  const f = document.getElementById('preview-frame');
  (f.requestFullscreen || f.webkitRequestFullscreen || f.msRequestFullscreen).call(f);
});

document.getElementById('btn-refine-toggle').addEventListener('click', () => {
  const visible = refineBar.classList.toggle('visible');
  if (visible) { refineInput.focus(); refineStatus.textContent = ''; }
});

/* ============ Inline AI edit (Ctrl+I bar) ============ */
aiCancel.addEventListener('click', closeAiBar);
aiInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') applyAiEdit();
  if (e.key === 'Escape') closeAiBar();
});
aiSubmit.addEventListener('click', applyAiEdit);

function closeAiBar() {
  aiBar.style.display = 'none';
  if (editor) editor.focus();
}

async function applyAiEdit() {
  const prompt = aiInput.value.trim();
  if (!prompt || !editor) return;

  const selection = editor.getSelection();
  const selectedText = editor.getModel().getValueInRange(selection);
  const code = selectedText || editor.getValue();

  aiSubmit.disabled = true;
  aiSubmit.textContent = 'Editing…';

  try {
    const res = await fetch('/api/refine', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ html: code, prompt }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'AI edit failed');

    if (selectedText) {
      editor.executeEdits('ai-edit', [{
        range: new monaco.Range(
          selection.startLineNumber, selection.startColumn,
          selection.endLineNumber, selection.endColumn
        ),
        text: data.html,
        forceMoveMarkers: true,
      }]);
    } else {
      editor.setValue(data.html);
    }
    markDirty();
    renderPreview();
    closeAiBar();
    showToast('AI edit applied');
  } catch (err) {
    showToast('Error: ' + err.message, true);
  } finally {
    aiSubmit.disabled = false;
    aiSubmit.textContent = 'Apply';
  }
}

/* ============ AI Refine bar ============ */
refineClose.addEventListener('click', () => {
  refineBar.classList.remove('visible');
  refineStatus.textContent = '';
});

refineInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendRefine(); });
refineSend.addEventListener('click', sendRefine);

async function sendRefine() {
  const prompt = refineInput.value.trim();
  if (!prompt || !editor) return;

  refineSend.disabled = true;
  refineStatus.textContent = 'Sending to Gemini…';
  refineStatus.className = 'refine-status thinking';

  try {
    const res = await fetch('/api/refine', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ html: editor.getValue(), prompt }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Refinement failed');
    editor.setValue(data.html);
    markDirty();
    renderPreview();
    refineInput.value = '';
    refineStatus.textContent = 'Done — refinement applied.';
    refineStatus.className = 'refine-status';
    showToast('Refinement applied');
  } catch (err) {
    refineStatus.textContent = 'Error: ' + err.message;
    refineStatus.className = 'refine-status';
    showToast('Refinement failed: ' + err.message, true);
  } finally {
    refineSend.disabled = false;
  }
}

/* ============ Toast ============ */
let _toastTimer;
function showToast(msg, isError) {
  toastEl.textContent = msg;
  toastEl.style.background = isError ? '#b3271e' : 'var(--ink)';
  toastEl.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
}
</script>
</body>
</html>
